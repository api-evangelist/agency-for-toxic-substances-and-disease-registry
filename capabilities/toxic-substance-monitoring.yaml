name: Toxic Substance Monitoring
description: "Research and monitoring workflow for hazardous substance toxicology data from ATSDR including profiles, health guidance, and exposure investigations."
apisComposed:
  - atsdr-toxic-substance-profiles-api
tools:
  - name: research-substance-toxicology
    description: "Look up toxicological profile for a specific hazardous substance to understand health effects and exposure routes."
    sharedTool: atsdr-toxic-substance-profiles-api/list-toxicological-profiles
  - name: get-minimum-risk-levels
    description: "Retrieve ATSDR Minimum Risk Levels for a substance to assess safe exposure thresholds by route and duration."
    sharedTool: atsdr-toxic-substance-profiles-api/list-minimum-risk-levels
  - name: check-priority-ranking
    description: "Check where a substance ranks on the ATSDR Substance Priority List based on toxicity and frequency at Superfund sites."
    sharedTool: atsdr-toxic-substance-profiles-api/list-substance-priority-list
  - name: find-exposure-investigations
    description: "Find ATSDR exposure investigations and health consultations near a location or involving specific contaminants."
    sharedTool: atsdr-toxic-substance-profiles-api/list-exposure-investigations
personas:
  - public-health-researcher
  - environmental-health-officer
