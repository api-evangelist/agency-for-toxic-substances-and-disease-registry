          https://raw.githubusercontent.com/api-evangelist/agency-for-toxic-substances-and-disease-registry/refs/heads/main/openapi/atsdr-toxic-substance-profiles-openapi.yml
        type: OpenAPI
    description: >-
      Access ATSDR toxicological profiles, minimum risk levels (MRLs), substance
      priority list rankings, and exposure investigation data for hazardous chemicals
      found at Superfund sites and in the environment.
