name: Agency for Toxic Substances and Disease Registry
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Diseases
  - Federal Government
  - Public Health
  - Toxic Substances
  - Environmental Health
  - Hazardous Materials
description: >-
  ATSDR protects communities from harmful health effects related to exposure to
  natural and man-made hazardous substances. It is a federal public health
  agency within the U.S. Department of Health and Human Services. ATSDR
  provides toxicological profiles, minimum risk levels, substance priority
  rankings, and exposure investigation data for hazardous chemicals.
created: '2024-11-21'
