specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Agency for Toxic Substances and Disease Registry
providerId: agency-for-toxic-substances-and-disease-registry
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Diseases
  - Federal Government
  - Public Health
  - Toxic Substances
  - Environmental Health
